name: CI

# Jalankan setiap kali push atau buka Pull Request ke branch main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Database PostgreSQL sementara — untuk sahkan migration jalan pada Postgres sebenar.
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1) Ambil kod dari repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2) Pasang PHP 8.3 + extension yang perlu
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_pgsql, pgsql, sqlite3, pdo_sqlite, bcmath, ctype, fileinfo, tokenizer
          coverage: none

      # 3) Pasang pakej PHP (cache supaya laju)
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # 4) Sediakan .env + app key
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # 5) Pasang Node + bina frontend (Vue/Vite)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # 6) Sahkan migration berjaya jalan pada PostgreSQL sebenar
      - name: Run migrations on PostgreSQL
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: php artisan migrate --force

      # 7) Jalankan ujian (guna SQLite in-memory — cepat)
      - name: Run tests
        run: php artisan test

  # ── Deploy ke Render — HANYA jalan kalau job "build-and-test" lulus ──
  deploy:
    name: Deploy to Render
    needs: build-and-test          # tunggu test lulus dulu
    runs-on: ubuntu-latest
    # Cuma deploy bila push ke main (bukan Pull Request)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "⚠️  Secret RENDER_DEPLOY_HOOK belum diset — deploy dilangkau."
            exit 0
          fi
          curl -fsS -X POST "$HOOK"
          echo "✅ Deploy dipicu di Render."
